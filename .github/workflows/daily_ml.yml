name: Daily ML Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "15 12 * * 0-4"

jobs:
  run-ml:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        run: python main.py

      - name: Commit processed outputs
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add data/processed models
          git diff --staged --quiet || git commit -m "Auto-update predictions"
          git push
